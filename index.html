<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>App Séries</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h2>Buscar Séries</h2>

  <form id="formBusca" onsubmit="event.preventDefault(); buscar();">
    <input type="text" id="busca" placeholder="Buscar série..." autocomplete="off" />
    <button type="submit">Buscar</button>
  </form>

  <h3>Resultados</h3>
  <div id="resultados"></div>

  <h3>Favoritos</h3>
  <ul id="favoritos"></ul>

  <script src="script.js"></script>
</body>
</html>
